on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    # Pinned to match the zmk revision in config/west.yml. The @main
    # workflow runs a post-build board-compat check that requires the
    # newer Zephyr's `west boards --format {qualifiers}` and crashes
    # against v0.3.0's Zephyr (KeyError: 'qualifiers').
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3.0
