# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:
  # ZMK on Zephyr 4.1 (Dec 2025) renamed the board:
  # nice_nano_v2 -> nice_nano//zmk  (== nice_nano@2.0.0//zmk)
  #
  # Dongle = central (plugged into computer via USB). Holds the keymap.
  - board: nice_nano//zmk
    shield: corne_dongle_pro_micro
  # Both halves are now peripherals, so the left no longer acts as
  # central relaying the right -> much less battery drain.
  - board: nice_nano//zmk
    shield: corne_left_peripheral
  - board: nice_nano//zmk
    shield: corne_right
